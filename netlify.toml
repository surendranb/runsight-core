[build]
  publish = "dist"
  command = "npm run build"
  branch = "main"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--production=false"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirect rules for SPA and auth callback
[[redirects]]
  from = "/auth/callback"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Refined Content-Security-Policy
    # NOTE: 'unsafe-inline' is added to script-src and style-src. This is a temporary
    # measure to allow the Vite-built application to load for testing. A stricter
    # policy using nonces or hashes should be implemented for long-term security.
    Content-Security-Policy = [
      "default-src 'self'",
      "script-src 'self' https://*.netlify.app 'unsafe-inline'",
      "style-src 'self' 'unsafe-inline'",
      "img-src 'self' data: https:",
      # FIX: Removed invalid host /.netlify/functions/* from connect-src
      "connect-src 'self' https://*.netlify.app https://*.supabase.co https://*.supabase.io https://api.strava.com https://*.strava.com", 
      "font-src 'self' https: data:",
      "object-src 'none'",
      "base-uri 'self'",
      "form-action 'self' https://www.strava.com",
      "frame-ancestors 'self'",
      "frame-src 'self' https://www.youtube.com",
      "worker-src 'self' blob:"
    ]

[dev]
  command = "npm run dev"
  port = 3000
  publish = "dist"
